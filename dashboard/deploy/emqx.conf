node {
  name = "emqx@prod-node1"
  cookie = "smartagri-emqx-cookie-change-on-rebuild"
  data_dir = "data"
}

cluster {
  name = smartagri
  discovery_strategy = manual
}

listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 1024
  ssl_options {
    keyfile = "/opt/emqx/etc/certs/server.key"
    certfile = "/opt/emqx/etc/certs/server.crt"
    cacertfile = "/opt/emqx/etc/certs/ca.crt"
    verify = verify_none
    fail_if_no_peer_cert = false
  }
}

# No public plaintext MQTT or WebSocket listeners are enabled.
listeners.tcp.default.bind = "127.0.0.1:1883"
listeners.ws.default.bind = "127.0.0.1:8083"
listeners.wss.default.bind = "127.0.0.1:8084"

dashboard {
  listeners.http.bind = "127.0.0.1:18083"
}

authentication = [
  {
    backend = built_in_database
    mechanism = password_based
    user_id_type = username
    enable = true
  }
]

authorization {
  no_match = deny
  deny_action = disconnect
  sources = [
    {
      type = built_in_database
      enable = true
    }
  ]
}

mqtt {
  max_packet_size = "1MB"
  max_inflight = 32
}

retainer {
  enable = true
  max_retained_messages = 1000
}
